<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Cyber Defense Sim | A1 Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #050505; color: #e2e8f0; }
        .cyber-card { background: #0f172a; border: 1px solid #1e293b; transition: all 0.3s; }
        .active-glow { border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
        .alarm-bg { animation: flash-red 1s infinite; }
        @keyframes flash-red { 0%, 100% { border-color: #ef4444; } 50% { border-color: #7f1d1d; } }
        .success-bg { border-color: #22c55e; }
    </style>
</head>
<body class="p-4 md:p-10">

<div class="max-w-6xl mx-auto">
    <h1 class="text-4xl font-black text-white mb-8 text-center uppercase">SOC <span class="text-blue-500">EXPOSURE</span> SIMULATOR</h1>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <!-- Quellen -->
        <div class="space-y-4">
            <h2 class="text-lg font-bold text-blue-400">1. Überwachungskameras aktivieren:</h2>
            <div id="logGrid" class="grid grid-cols-2 gap-3"></div>
        </div>

        <!-- Simulation -->
        <div class="space-y-6">
            <h2 class="text-lg font-bold text-orange-400">2. Angriff starten:</h2>
            <div id="attackGrid" class="grid grid-cols-2 gap-3"></div>
            
            <div id="result" class="hidden p-6 rounded-2xl border-l-8 bg-slate-900 shadow-xl transition-all">
                <div id="resultContent" class="text-sm leading-relaxed"></div>
            </div>
            
            <button id="runBtn" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-xl font-bold uppercase tracking-widest transition hover:scale-[1.02]">Bedrohung simulieren</button>
        </div>
    </div>
</div>

<script>
    const sources = [
        { id: 'ad', name: 'AD (Logins)', icon: 'fa-user-shield' },
        { id: 'edr', name: 'EDR (Viren)', icon: 'fa-microchip' },
        { id: 'dns', name: 'DNS (Netzwerk)', icon: 'fa-network-wired' },
        { id: 'fw', name: 'Firewall', icon: 'fa-shield-halved' }
    ];

    const attacks = [
        { name: 'Datendiebstahl', req: ['fw', 'dns'], explanation: 'Hacker schleusen Daten über das DNS-Protokoll aus. Da du DNS-Logs nicht überwachst, blieb dieser "Tunnel" völlig unsichtbar.' },
        { name: 'Ransomware', req: ['edr', 'fw'], explanation: 'Die Ransomware konnte sich unbemerkt im Netz verbreiten, weil der EDR-Scanner die Dateibewegungen nicht melden konnte.' }
    ];

    let active = new Set();
    let currentAttack = null;

    // UI Aufbau
    const logGrid = document.getElementById('logGrid');
    sources.forEach(s => {
        const btn = document.createElement('button');
        btn.className = "flex items-center gap-3 p-4 cyber-card rounded-xl hover:border-blue-500";
        btn.innerHTML = `<i class="fa ${s.icon} text-blue-500"></i><span>${s.name}</span>`;
        btn.onclick = () => {
            active.has(s.id) ? active.delete(s.id) : active.add(s.id);
            btn.classList.toggle('active-glow');
        };
        logGrid.appendChild(btn);
    });

    const attackGrid = document.getElementById('attackGrid');
    attacks.forEach(a => {
        const btn = document.createElement('button');
        btn.className = "p-4 cyber-card rounded-xl hover:border-orange-500";
        btn.innerText = a.name;
        btn.onclick = () => {
            document.querySelectorAll('#attackGrid button').forEach(b => b.classList.remove('bg-orange-900/50'));
            currentAttack = a;
            btn.classList.add('bg-orange-900/50', 'border-orange-500');
        };
        attackGrid.appendChild(btn);
    });

    document.getElementById('runBtn').onclick = () => {
        if(!currentAttack) return alert('Wähle einen Angriff!');
        const res = document.getElementById('result');
        const content = document.getElementById('resultContent');
        res.classList.remove('hidden', 'alarm-bg', 'success-bg');
        
        const missing = currentAttack.req.filter(r => !active.has(r));
        
        if(missing.length === 0) {
            res.classList.add('success-bg');
            content.innerHTML = `<h3 class='text-green-400 font-bold text-lg'>✅ Angriff abgewehrt!</h3><p class='mt-2'>Deine Sicherheits-Tools haben den Hacker sofort erkannt und blockiert.</p>`;
        } else {
            res.classList.add('alarm-bg');
            content.innerHTML = `<h3 class='text-red-400 font-bold text-lg'>❌ Einbruch erfolgreich!</h3>
                                <p class='mt-2 text-red-200'>Der Angreifer hatte freie Bahn.</p>
                                <p class='mt-3 font-medium'>Warum? ${currentAttack.explanation}</p>`;
        }
    };
</script>
</body>
</html>
