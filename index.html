<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>SOC Exposure Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glow { box-shadow: 0 0 15px rgba(0, 180, 255, 0.3); }
        .cyber-bg { background: radial-gradient(circle at center, #0f172a 0%, #020617 100%); }
    </style>
</head>
<body class="cyber-bg text-blue-100 min-h-screen p-8">

<div class="max-w-4xl mx-auto">
    <header class="mb-10 text-center">
        <h1 class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300">SOC Maturity Simulator</h1>
        <p class="text-slate-400">Wie sicher ist deine Infrastruktur wirklich?</p>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div class="space-y-4">
            <h2 class="text-xl font-semibold border-b border-blue-900 pb-2">1. Infrastruktur-Audit</h2>
            <div id="logOptions" class="grid grid-cols-2 gap-2"></div>
        </div>

        <div class="space-y-6">
            <h2 class="text-xl font-semibold border-b border-blue-900 pb-2">2. Live Simulation</h2>
            <button id="runSim" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-lg font-bold transition">Angriff starten</button>
            <div id="result" class="p-4 rounded-xl border hidden"></div>
        </div>
    </div>
</div>

<script>
const logs = [
    {id: 'fw', name: 'Firewall'}, {id: 'ad', name: 'Active Dir'}, 
    {id: 'edr', name: 'EDR/Endpoint'}, {id: 'mail', name: 'Mail Gateway'},
    {id: 'vpn', name: 'VPN'}, {id: 'dns', name: 'DNS Logs'}
];

const attacks = [
    {name: 'Ransomware', req: ['edr', 'fw', 'ad'], desc: 'Verschlüsselung der Fileserver.'},
    {name: 'Data Exfiltration', req: ['fw', 'dns', 'proxy'], desc: 'Abfluss sensibler Daten via DNS Tunneling.'}
];

let selectedLogs = new Set();

// UI Render
const container = document.getElementById('logOptions');
logs.forEach(l => {
    const btn = document.createElement('button');
    btn.className = "p-3 bg-slate-800 rounded border border-slate-700 hover:border-blue-500 transition";
    btn.innerText = l.name;
    btn.onclick = () => {
        btn.classList.toggle('border-blue-500');
        selectedLogs.has(l.id) ? selectedLogs.delete(l.id) : selectedLogs.add(l.id);
    };
    container.appendChild(btn);
});

document.getElementById('runSim').onclick = () => {
    const res = document.getElementById('result');
    res.classList.remove('hidden');
    const atk = attacks[Math.floor(Math.random() * attacks.length)];
    
    const missing = atk.req.filter(r => !selectedLogs.has(r));
    
    if(missing.length === 0) {
        res.className = "p-4 rounded-xl border border-green-500 bg-green-900/20";
        res.innerHTML = `✅ <strong>Erkannt:</strong> ${atk.name} wurde durch ${atk.req.join(', ')} gestoppt.`;
    } else {
        res.className = "p-4 rounded-xl border border-red-500 bg-red-900/20";
        res.innerHTML = `❌ <strong>Blind Spot:</strong> ${atk.name} erfolgreich. ${missing.join(', ')} fehlen im Monitoring!`;
    }
};
</script>
</body>
</html>
