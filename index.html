<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Cyber-Sim Pro | A1 Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #e2e8f0; font-family: sans-serif; }
        .card-active { border-color: #3b82f6 !important; background: #1e3a8a !important; color: white !important; }
        .attack-active { border-color: #f59e0b !important; background: #92400e !important; color: white !important; }
        .gradient-text { background: linear-gradient(to right, #60a5fa, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="p-4 md:p-10">

<div class="max-w-7xl mx-auto">
    <div class="text-center mb-10">
        <h1 class="text-5xl font-black gradient-text uppercase tracking-tighter">Cyber-Sim Pro Enterprise</h1>
        <p class="text-slate-400 mt-2">Sicherheitsanalyse für dein Unternehmen</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-2xl">
            <h2 class="font-bold mb-4 text-blue-300 uppercase text-xs tracking-widest">Infrastruktur & Logs</h2>
            <div id="logGrid" class="grid grid-cols-2 gap-2"></div>
        </div>

        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-2xl">
            <h2 class="font-bold mb-4 text-orange-400 uppercase text-xs tracking-widest">Angriffsszenario</h2>
            <div id="attackGrid" class="grid grid-cols-1 gap-2"></div>
        </div>

        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-2xl flex flex-col">
            <h2 class="font-bold mb-4 text-green-400 uppercase text-xs tracking-widest">Live Analyse</h2>
            <div id="simResult" class="flex-grow p-5 bg-black rounded-lg border border-slate-700 italic text-slate-400 text-sm">
                Wähle Logquellen und einen Angriff aus...
            </div>
            <button id="runBtn" class="mt-6 w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-xl font-bold uppercase tracking-widest transition hover:scale-[1.02]">Simulieren</button>
            <button id="copyBtn" class="hidden mt-2 w-full bg-slate-700 hover:bg-slate-600 py-2 rounded-lg font-bold text-xs uppercase tracking-widest transition">Bericht in Zwischenablage kopieren</button>
        </div>
    </div>
</div>

<script>
    const sources = [
        { id: 'ad', name: 'Active Directory' }, { id: 'edr', name: 'EDR / Endpoint' },
        { id: 'mail', name: 'Mail Gateway' }, { id: 'fw', name: 'Firewall' },
        { id: 'vpn', name: 'VPN Gateway' }, { id: 'dns', name: 'DNS Security' },
        { id: 'db', name: 'Datenbank Logs' }, { id: 'cloud', name: 'Cloud Activity' },
        { id: 'proxy', name: 'Web Proxy' }, { id: 'ids', name: 'IDS / IPS' }
    ];

    const attacks = [
        { name: 'Ransomware', req: ['edr', 'fw', 'ad'], desc: 'Ein Virus verschlüsselt deine Dateien.' },
        { name: 'Datendiebstahl', req: ['fw', 'db', 'dns'], desc: 'Abfluss von Kundendaten nach extern.' },
        { name: 'Phishing', req: ['mail', 'ad', 'proxy'], desc: 'Manipulation über gefälschte E-Mails.' }
    ];

    let activeLogs = new Set();
    let selectedAttack = null;
    let lastReport = "";

    sources.forEach(s => {
        const btn = document.createElement('button');
        btn.className = "p-3 bg-slate-800 border border-slate-700 rounded text-xs hover:border-blue-500 transition";
        btn.innerText = s.name;
        btn.onclick = () => {
            activeLogs.has(s.id) ? activeLogs.delete(s.id) : activeLogs.add(s.id);
            btn.classList.toggle('card-active');
        };
        document.getElementById('logGrid').appendChild(btn);
    });

    attacks.forEach(a => {
        const btn = document.createElement('button');
        btn.className = "p-3 bg-slate-800 border border-slate-700 rounded text-sm hover:border-orange-500 transition";
        btn.innerText = a.name;
        btn.onclick = () => {
            document.querySelectorAll('#attackGrid button').forEach(b => b.classList.remove('attack-active'));
            selectedAttack = a;
            btn.classList.add('attack-active');
        };
        document.getElementById('attackGrid').appendChild(btn);
    });

    document.getElementById('runBtn').onclick = async () => {
        if(!selectedAttack) return alert('Wähle einen Angriff!');
        const res = document.getElementById('simResult');
        const copyBtn = document.getElementById('copyBtn');
        
        res.innerHTML = "🔍 Scanne Umgebung...";
        await new Promise(r => setTimeout(r, 1000));
        
        const missing = selectedAttack.req.filter(r => !activeLogs.has(r));
        const date = new Date().toLocaleDateString('de-DE');

        if(missing.length === 0) {
            lastReport = `SECURITY HEALTH REPORT (${date})\n------------------------------\nAngriff: ${selectedAttack.name}\nStatus: VOLLSTÄNDIG ABGEWEHRT\nErgebnis: Sicherheitssysteme haben den Angriff erfolgreich korreliert.`;
            res.innerHTML = `<div class='text-green-400 font-bold text-lg'>✅ ABGEWEHRT</div><p class='mt-2'>Angriff erkannt und gestoppt.</p>`;
        } else {
            lastReport = `SECURITY HEALTH REPORT (${date})\n------------------------------\nAngriff: ${selectedAttack.name}\nStatus: EINBRUCH ERFOLGREICH\nRisiko: Angriff konnte nicht erkannt werden.\nFehlende Quellen: ${missing.join(', ')}\nEmpfehlung: Implementierung der fehlenden Logquellen zur Schließung der Sicherheitslücke.`;
            res.innerHTML = `<div class='text-red-500 font-bold text-lg'>❌ EINBRUCH</div><p class='mt-2'>Der Hacker war erfolgreich. Fehlend: <strong>${missing.join(', ')}</strong>.</p>`;
        }
        copyBtn.classList.remove('hidden');
    };

    document.getElementById('copyBtn').onclick = () => {
        navigator.clipboard.writeText(lastReport);
        alert('Bericht in Zwischenablage kopiert!');
    };
</script>
</body>
</html>
