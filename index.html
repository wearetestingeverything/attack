<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>🛡️ SOC-XDR Pro Simulation</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { background: #080c18; font-family: 'Inter', sans-serif; color: #e8edf5; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .grid-main { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: rgba(14, 22, 40, 0.7); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; }
        .log-item { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 12px; cursor: pointer; margin-bottom: 8px; transition: 0.3s; }
        .log-item.active { border-color: #00b4ff; background: rgba(0, 180, 255, 0.1); }
        .attack-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; cursor: pointer; color: white; width: 100%; text-align: left; margin-bottom: 10px; }
        .attack-btn.selected { border-color: #f97316; background: rgba(249, 115, 22, 0.1); }
        #siemResult { padding: 20px; border-radius: 15px; background: rgba(0,0,0,0.3); border-left: 5px solid #4a5568; }
        .btn-primary { background: #00b4ff; border: none; padding: 15px 30px; border-radius: 50px; color: #000; font-weight: 800; cursor: pointer; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛡️ SOC-XDR Pro Simulation</h1>
        <div class="grid-main">
            <div class="card">
                <h3>📂 Logquellen</h3>
                <div id="logContainer"></div>
            </div>
            <div class="card">
                <h3>⚔️ Angriff wählen</h3>
                <div id="attackContainer"></div>
                <div id="siemResult">
                    <div id="verdict">Wähle Angriff & Quellen</div>
                    <div id="detail" style="font-size: 0.9rem; margin-top:10px;"></div>
                </div>
                <button class="btn-primary" onclick="runSimulation()">🚀 ANALYSE STARTEN</button>
            </div>
        </div>
    </div>

    <script>
        const logSources = [
            { id: 'fw', label: 'Firewall', desc: 'Netzwerkverkehr' },
            { id: 'ad', label: 'Active Directory', desc: 'Logins' },
            { id: 'endpoint', label: 'EDR / Endpoint', desc: 'Prozesse' },
            { id: 'mail', label: 'Mail Gateway', desc: 'E-Mail' }
        ];

        const attacks = [
            { 
                id: 'phishing', label: 'Phishing', required: ['mail', 'ad', 'endpoint'],
                desc: 'Phishing-Angriff mit Credential Theft.'
            }
        ];

        let activeLogs = new Set();
        let currentAttack = null;

        // Init UI
        function init() {
            const lc = document.getElementById('logContainer');
            logSources.forEach(l => {
                const div = document.createElement('div');
                div.className = 'log-item';
                div.innerHTML = `<strong>${l.label}</strong><br>${l.desc}`;
                div.onclick = () => {
                    activeLogs.has(l.id) ? activeLogs.delete(l.id) : activeLogs.add(l.id);
                    div.classList.toggle('active');
                };
                lc.appendChild(div);
            });

            const ac = document.getElementById('attackContainer');
            attacks.forEach(a => {
                const btn = document.createElement('button');
                btn.className = 'attack-btn';
                btn.innerHTML = a.label;
                btn.onclick = () => {
                    currentAttack = a;
                    document.querySelectorAll('.attack-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                };
                ac.appendChild(btn);
            });
        }

        function runSimulation() {
            if(!currentAttack) return alert('Wähle einen Angriff!');
            
            const missing = currentAttack.required.filter(id => !activeLogs.has(id));
            const vEl = document.getElementById('verdict');
            const dEl = document.getElementById('detail');
            const resEl = document.getElementById('siemResult');

            if(missing.length === 0) {
                vEl.innerHTML = "✅ ERKANNT";
                dEl.innerHTML = "Alle Quellen aktiv. Das SOC kann den Angriff stoppen.";
                resEl.style.borderLeftColor = "#4ade80";
            } else if(missing.length < currentAttack.required.length) {
                vEl.innerHTML = "⚠️ TEILWEISE ERKANNT";
                dEl.innerHTML = "Fehlende Quellen: " + missing.join(', ');
                resEl.style.borderLeftColor = "#fb923c";
            } else {
                vEl.innerHTML = "❌ BLIND SPOT";
                dEl.innerHTML = "Angriff komplett unsichtbar!";
                resEl.style.borderLeftColor = "#f87171";
            }
        }

        init();
    </script>
</body>
</html>
